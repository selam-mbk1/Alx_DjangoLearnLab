<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Django Blog{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <header>
        <h1><a href="/">My Django Blog</a></h1>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'blog/app.js' %}"></script>
</body>
</html>
